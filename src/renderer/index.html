<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' file: blob:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Video Tiler</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="activity-active">
    <div id="app">
      <header id="toolbar" class="ui-layer">
        <button id="editModeBtn" class="toggle-btn">Edit Mode: Off</button>
        <button id="gridBtn" class="toggle-btn">Grid: Off</button>
        <button id="snapBtn" class="toggle-btn">Snap: On</button>
        <button id="spanDisplaysBtn" class="toggle-btn">Span All Displays: Off</button>
        <button id="resetLayoutBtn">Reset Layout</button>
        <div class="toolbar-spacer"></div>
        <span id="displayStatus">Displays: -</span>
      </header>

      <main id="workspaceWrapper">
        <div id="gridOverlay"></div>
        <div id="workspace"></div>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
